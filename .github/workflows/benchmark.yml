name: Codspeed

permissions: {}

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'yarn'
      - name: Install dependencies
        run: yarn install
      - name: Download fixtures
        run: node download-fixtures.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: Build benchmark
        run: cargo codspeed build --features codspeed
        env:
          # Cap the ISA at the AVX2 baseline. `target-cpu=native` makes LLVM
          # emit AVX-512-class instructions unconditionally based on the
          # assigned runner's CPU, which CodSpeed's Valgrind simulation cannot
          # execute (SIGILL / exit 132). x86-64-v3 stays within what Valgrind
          # supports while still exercising the AVX2 kernel.
          RUSTFLAGS: '-C target-cpu=x86-64-v3'

      - name: Run benchmark
        uses: CodSpeedHQ/action@v4
        timeout-minutes: 15
        with:
          run: cargo codspeed run
          mode: simulation
          token: ${{ secrets.CODSPEED_TOKEN }}